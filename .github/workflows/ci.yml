name: CI

# Single-origin gate: every generated distribution artifact (skills, MCP configs,
# tool tables, plugin manifest) must match what build/generate.mjs emits from the
# spmc-server origin. `build:check` fails on any drift — a hand-edited generated
# file, a tool/limit/credential added without rebuilding, or a stray prose token.
on:
  push:
    # `development` is the integration branch — feature branches merge into it by
    # direct push (no PR), so it must be gated here or those merges run no CI.
    branches: [main, development, 'feature/**']
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: spmc-server/package-lock.json

      - name: Install server deps
        run: npm --prefix spmc-server ci

      # Verifies generated artifacts are in sync with the origin and that
      # .env.example documents every credential the server reads. The machine-
      # local agent/mcp-config.json is skipped by --check (absolute install path
      # = environment, not origin); its shape is still covered via the shared
      # mcpConfig() template that .mcp.json/claude_desktop_config.json keep checked.
      - name: Verify generated artifacts match the single origin
        run: npm run build:check

      - name: Unit tests
        run: npm test

      - name: MCP smoke test
        run: npm --prefix spmc-server run test:smoke

      # Packs the tarball exactly as `npm publish` would, installs it into a
      # throwaway project, and boots the bin — catches a `files`-array omission
      # (e.g. a missing lib/) that build:check and the unit/smoke tests can't see,
      # because they run against the source tree, not the packaged artifact.
      - name: Package smoke (tarball installs and boots)
        run: npm --prefix spmc-server run pack:smoke
