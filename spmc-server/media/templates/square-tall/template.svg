<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <!-- panel overlay: lighter bg strip at bottom third -->
  <rect width="1080" height="1350" fill="{{bg_color}}" />
  <rect x="0" y="990" width="1080" height="360" fill="#121b33" opacity="0.85" />

  <!-- accent bar -->
  <rect x="80" y="970" width="6" height="220" fill="{{accent}}" />

  <!-- headline -->
  <text
    x="110"
    y="1060"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="64"
    font-weight="700"
    fill="#8ac0dd"
    dominant-baseline="hanging"
    xml:space="preserve"
  >{{headline_line1}}</text>
  <text
    x="110"
    y="1140"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="64"
    font-weight="700"
    fill="#8ac0dd"
    dominant-baseline="hanging"
    xml:space="preserve"
  >{{headline_line2}}</text>

  <!-- subtext -->
  <text
    x="110"
    y="1230"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="32"
    font-weight="400"
    fill="{{accent}}"
    opacity="0.85"
    dominant-baseline="hanging"
    xml:space="preserve"
  >{{subtext}}</text>
</svg>
