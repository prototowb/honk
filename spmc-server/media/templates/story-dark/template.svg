<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1920" viewBox="0 0 1080 1920">
  <defs>
    <radialGradient id="glow" cx="90%" cy="14%" r="70%">
      <stop offset="0%"  stop-color="{{accent}}" stop-opacity="0.16" />
      <stop offset="55%" stop-color="{{accent}}" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- dark base + subtle brand-colored glow -->
  <rect width="1080" height="1920" fill="{{bg_color}}" />
  <rect width="1080" height="1920" fill="url(#glow)" />

  <!-- brand row (below the top story-UI safe zone) -->
  <rect x="124" y="360" width="24" height="24" rx="6" fill="{{accent}}" />
  <text x="166" y="358" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif"
        font-size="32" font-weight="600" fill="{{body_color}}" dominant-baseline="hanging"
        xml:space="preserve">{{handle}}</text>

  <!-- layered content surface (held within the safe center band) -->
  <rect x="64" y="500" width="952" height="1080" rx="40" fill="{{surface}}" />

  <!-- hero: accent bar + optional eyebrow + headline -->
  <rect x="124" y="580" width="88" height="9" rx="4.5" fill="{{accent}}" />
  <text x="124" y="616" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif"
        font-size="28" font-weight="700" fill="{{accent}}" letter-spacing="5"
        dominant-baseline="hanging" xml:space="preserve">{{kicker}}</text>
  <text y="{{headline_y}}" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif"
        font-size="96" font-weight="800" fill="{{heading_color}}" letter-spacing="-1"
        dominant-baseline="hanging" xml:space="preserve">{{headline_tspans}}</text>

  <!-- body (y flows from the headline's line count) -->
  <text y="{{body_y}}" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif"
        font-size="42" font-weight="400" fill="{{body_color}}"
        dominant-baseline="hanging" xml:space="preserve">{{body_tspans}}</text>

  <!-- finishing accent rule inside the surface -->
  <rect x="124" y="1470" width="440" height="6" rx="3" fill="{{accent}}" opacity="0.5" />
</svg>
