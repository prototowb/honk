<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="628" viewBox="0 0 1200 628">
  <rect width="1200" height="628" fill="{{bg_color}}" />
  <!-- right panel -->
  <rect x="600" y="0" width="600" height="628" fill="#121b33" opacity="0.75" />

  <!-- accent bar -->
  <rect x="580" y="80" width="6" height="468" fill="{{accent}}" />

  <!-- headline -->
  <text
    x="614"
    y="180"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="56"
    font-weight="700"
    fill="#8ac0dd"
    dominant-baseline="hanging"
    xml:space="preserve"
  >{{headline_line1}}</text>
  <text
    x="614"
    y="248"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="56"
    font-weight="700"
    fill="#8ac0dd"
    dominant-baseline="hanging"
    xml:space="preserve"
  >{{headline_line2}}</text>

  <!-- subtext -->
  <text
    x="614"
    y="360"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="30"
    font-weight="400"
    fill="{{accent}}"
    opacity="0.85"
    dominant-baseline="hanging"
    xml:space="preserve"
  >{{subtext}}</text>
</svg>
